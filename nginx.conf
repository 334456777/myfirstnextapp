# ====================================
# Nginx 配置 yusteven.com 缓存优化版
# ====================================

# 默认站点 拒绝未匹配请求
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name "";
    return 403;
}

# HTTP 强制跳转到 HTTPS www
server {
    listen 80;
    server_name yusteven.com www.yusteven.com;
    access_log /var/log/nginx/http_redirect_access.log combined;
    return 301 https://www.yusteven.com$request_uri;
}

# HTTPS 主域名跳转到 www
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yusteven.com;

    # SSL配置 核心引用
    ssl_certificate /etc/letsencrypt/live/yusteven.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yusteven.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m; 

    access_log /var/log/nginx/main_domain_access.log combined;
    return 301 https://www.yusteven.com$request_uri;
}

# HTTPS www 子域名服务静态网页
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.yusteven.com;

    # SSL配置
    ssl_certificate /etc/letsencrypt/live/yusteven.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yusteven.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m; 
    
    # 增加安全头
    add_header Strict-Transport-Security "max-age=63072000; includeSubdomains; preload";
    add_header X-Frame-Options SAMEORIGIN;

    # 根目录设置
    root /var/www/html;
    
    # 日志配置
    access_log /var/log/nginx/www_access.log combined buffer=16k flush=5s;
    error_log /var/log/nginx/www_error.log warn;
    
    # 基本性能优化
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 20M;
    
    # 匹配图片 CSS JS等资源 设置超长缓存 最大化 Cloudflare 缓存
    location ~* \.(css|js|jpe?g|png|gif|ico|svg|eot|ttf|otf|woff2?|mp4|webp)$ {
        proxy_pass http://localhost:3000;
        
        # 强制设置超长缓存头 一年
        add_header Cache-Control "public, max-age=31536000"; 
        
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    
    # Next.js 静态文件 _next目录
    location /_next/static/ {
        proxy_pass http://localhost:3000;
        proxy_cache_valid 200 60m;
        # 关键缓存头 一年 不可变
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Next.js 应用反向代理 主要路由 动态 HTML
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        
        # 错误处理
        proxy_intercept_errors on;
        error_page 502 503 504 = @fallback;
    }
    
    # API 反向代理 天气 
    location /api/weather {
        # 保留 valid_referers 检查
        valid_referers none blocked server_names *.yusteven.com;
        if ($invalid_referer) { return 403; }
        
        proxy_pass http://localhost:3001;
        proxy_set_header Host $host;
        proxy_read_timeout 100s;

        # 关键缓存头 设置500秒缓存
        add_header Cache-Control "public, max-age=500";
    }
    
    # 优化 2 API 图片 添加缓存
    location /api/image {
        # 保留 valid_referers 检查
        valid_referers none blocked server_names *.yusteven.com;
        if ($invalid_referer) { return 403; }
        
        proxy_pass http://localhost:3002;
        proxy_set_header Host $host;

        # 关键缓存头 设置500秒缓存
        add_header Cache-Control "public, max-age=500";
    }

    # 日志文件访问 权限逻辑
    location /logs/ {
        deny all;
    }
    
location ~ ^/logs/(urls|critical_errors)\.log$ {
    valid_referers none blocked server_names *.yusteven.com;
    if ($invalid_referer) { return 403; }
    
    alias /home/yusteven/boluo/pyt/$1.log;
    default_type text/plain;
    add_header Cache-Control "no-cache";
}
    
    # 安全配置
    location ~ /\. { deny all; }
    
    # 健康检查
    location = /health {
        valid_referers none blocked server_names *.yusteven.com;
        if ($invalid_referer) { return 403; }
        access_log off;
        return 200 'OK';
    }
}
