# ====================================
# Nginx 配置 yusteven.com (终极优化版)
# ====================================

# 默认站点：直接断开未匹配的流氓请求
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name "";
    return 444; 
}

# HTTP (根域名) -> 跳转到 HTTP (www)
server {
    listen 80;
    listen [::]:80;
    server_name yusteven.com;

    return 301 http://www.yusteven.com$request_uri;
}

# HTTP www 主站点 (Cloudflare Flexible SSL: Cloudflare -> 源服务器使用 HTTP)
server {
    listen 80;
    listen [::]:80;
    server_name www.yusteven.com;
    
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;

    # 根目录 (未实际使用，Next.js 处理所有请求)
    root /var/www/html;
    
    # 日志配置
    access_log /var/log/nginx/www_access.log combined buffer=16k flush=5s;
    error_log /var/log/nginx/www_error.log warn;
    
    # 基本性能
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    client_max_body_size 20M;
    
    # --- 路由配置 ---

    # 静态资源 (图片/CSS/JS) -> 走 Next.js 服务但强行缓存
    location ~* \.(css|js|jpe?g|png|gif|ico|svg|eot|ttf|otf|woff2?|mp4|webp)$ {
        proxy_pass http://localhost:3000;
        include /etc/nginx/snippets/proxy-params.conf;
        
        # 强制 Cloudflare 和浏览器缓存 1 年
        add_header Cache-Control "public, max-age=31536000"; 
    }
    
    # Next.js 系统静态文件 (_next/static)
    location /_next/static/ {
        proxy_pass http://localhost:3000;
        include /etc/nginx/snippets/proxy-params.conf;
        
        # Next.js 构建文件带有哈希，可安全永久缓存
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # API: 天气 (端口 3001)
    location /api/weather {
        valid_referers none blocked server_names *.yusteven.com;
        if ($invalid_referer) { return 403; }
        
        proxy_pass http://localhost:3001;
        # 这里可能不需要全部 proxy headers，只需 Host 即可，视后端需求而定
        proxy_set_header Host $host; 
        
        add_header Cache-Control "public, max-age=500";
    }
    
    # API: 图片 (端口 3002)
    location /api/image {
        valid_referers none blocked server_names *.yusteven.com;
        if ($invalid_referer) { return 403; }
        
        proxy_pass http://localhost:3002;
        proxy_set_header Host $host;

        add_header Cache-Control "public, max-age=500";
    }

    # 特殊日志文件访问 (鉴权 + Alias)
    # 使用精确匹配 (=) 或 正则 (~) 时注意优先级
    location ~ ^/logs/(urls|critical_errors)\.log$ {
        valid_referers none blocked server_names *.yusteven.com;
        if ($invalid_referer) { return 403; }
        
        # 注意：Alias 路径末尾不要加 /，因为正则捕获了文件名
        alias /home/yusteven/boluo/pyt/$1.log;
        
        default_type text/plain;
        add_header Cache-Control "no-cache";
    }
    
    # 屏蔽其他所有 /logs/ 访问
    location /logs/ {
        deny all;
    }

    # Next.js 主路由 (接管所有其他请求)
    location / {
        proxy_pass http://localhost:3000;
        include /etc/nginx/snippets/proxy-params.conf;
        
        proxy_read_timeout 60s;
    }

    # 安全：禁止访问隐藏文件
    location ~ /\. { deny all; }
    
    # 健康检查
    location = /health {
        access_log off;
        return 200 'OK';
    }
}

# bot.yusteven.com (HTTP, Cloudflare Flexible SSL)
server {
    listen 80;
    listen [::]:80;
    server_name bot.yusteven.com;

    location / {
        proxy_pass http://127.0.0.1:7878;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}