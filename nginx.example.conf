# ====================================
# Public Nginx template
# ====================================
# Copy this file to nginx.conf on the server and replace every example value
# before enabling it. Do not commit the real production nginx.conf.

# Default vhost: close unmatched requests.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name "";
    return 444;
}

# Root domain -> www.
server {
    listen 80;
    listen [::]:80;
    server_name example.com;

    return 301 http://www.example.com$request_uri;
}

# Main Next.js site.
server {
    listen 80;
    listen [::]:80;
    server_name www.example.com;

    root /var/www/html;

    access_log /var/log/nginx/www_access.log combined buffer=16k flush=5s;
    error_log /var/log/nginx/www_error.log warn;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    location /_next/static/ {
        proxy_pass http://localhost:3000;
        include /etc/nginx/snippets/proxy-params.conf;

        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
    }

    location ~* \.(css|js|jpe?g|png|gif|ico|svg|eot|ttf|otf|woff2?|mp4|webp)$ {
        proxy_pass http://localhost:3000;
        include /etc/nginx/snippets/proxy-params.conf;

        add_header Cache-Control "public, max-age=31536000";
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
    }

    location /api/weather {
        valid_referers blocked server_names *.example.com;
        if ($invalid_referer) { return 403; }

        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Cache-Control "public, max-age=500";
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
    }

    location /api/image {
        valid_referers blocked server_names *.example.com;
        if ($invalid_referer) { return 403; }

        proxy_pass http://127.0.0.1:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Cache-Control "public, max-age=500";
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
    }

    # Optional private log aliases. Replace this with the server's real path.
    location ~ ^/logs/(urls|critical_errors)\.log$ {
        valid_referers blocked server_names *.example.com;
        if ($invalid_referer) { return 403; }

        alias /path/to/private/logs/$1.log;

        default_type text/plain;
        add_header Cache-Control "no-cache";
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
    }

    location /logs/ {
        deny all;
    }

    location /cgi-bin/ {
        return 403;
    }

    location / {
        proxy_pass http://localhost:3000;
        include /etc/nginx/snippets/proxy-params.conf;

        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        proxy_read_timeout 60s;
    }

    location ~ /\. { deny all; }

    location = /nginx-health {
        access_log off;
        return 200 'OK';
    }
}

# Private pay subdomain. Put this behind Cloudflare Access / Zero Trust.
server {
    listen 80;
    listen [::]:80;
    server_name pay.example.com;

    access_log /var/log/nginx/pay_access.log combined buffer=16k flush=5s;
    error_log /var/log/nginx/pay_error.log warn;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    client_max_body_size 2M;

    add_header Cache-Control "private, no-store, max-age=0" always;
    add_header X-Robots-Tag "noindex, nofollow" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "same-origin" always;

    location = / {
        proxy_pass http://localhost:3000/pay;
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_read_timeout 60s;
    }

    location = /pay {
        proxy_pass http://localhost:3000/pay;
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_read_timeout 60s;
    }

    location = /api/monthly-statement {
        proxy_pass http://localhost:3000;
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_read_timeout 60s;
    }

    location /_next/ {
        proxy_pass http://localhost:3000;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    location = /favicon.ico {
        proxy_pass http://localhost:3000;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    location = /robots.txt {
        default_type text/plain;
        return 200 "User-agent: *\nDisallow: /\n";
    }

    location / {
        return 404;
    }

    location ~ /\. { deny all; }
}

# Optional bot subdomain.
server {
    listen 80;
    listen [::]:80;
    server_name bot.example.com;

    location / {
        proxy_pass http://127.0.0.1:7878;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
